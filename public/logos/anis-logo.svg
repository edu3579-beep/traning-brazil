<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 390" width="820" height="390">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@300;400&amp;family=Frank+Ruhl+Libre:wght@400;500&amp;display=swap');
    </style>

    <!-- Gold border gradient -->
    <linearGradient id="goldMetal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#FFF8DC"/>
      <stop offset="20%"  stop-color="#FFD700"/>
      <stop offset="50%"  stop-color="#FFFACD"/>
      <stop offset="80%"  stop-color="#B8860B"/>
      <stop offset="100%" stop-color="#FFF8DC"/>
    </linearGradient>

    <!-- Shimmer for ANIS -->
    <linearGradient id="anisShimmer" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#B8860B">
        <animate attributeName="stop-color" values="#B8860B;#FFFACD;#FFD700;#B8860B" dur="3s" repeatCount="indefinite"/>
      </stop>
      <stop offset="35%"  stop-color="#FFFACD">
        <animate attributeName="stop-color" values="#FFFACD;#FFD700;#FFF8DC;#FFFACD" dur="3s" repeatCount="indefinite"/>
      </stop>
      <stop offset="65%"  stop-color="#FFD700">
        <animate attributeName="stop-color" values="#FFD700;#FFF8DC;#B8860B;#FFD700" dur="3s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#DAA520">
        <animate attributeName="stop-color" values="#DAA520;#FFD700;#FFFACD;#DAA520" dur="3s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>

    <!-- 3D petal surface: convex metallic — horizontal gradient dark→bright→dark -->
    <linearGradient id="petal3D" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#2E1A00"/>
      <stop offset="15%"  stop-color="#7B5B00"/>
      <stop offset="38%"  stop-color="#C8960C"/>
      <stop offset="52%"  stop-color="#FFF0A0"/>
      <stop offset="60%"  stop-color="#FFD700"/>
      <stop offset="78%"  stop-color="#A07010"/>
      <stop offset="100%" stop-color="#3D2500"/>
    </linearGradient>

    <!-- Same for shorter diagonal petals (slightly different shade) -->
    <linearGradient id="petal3DSec" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#2A1800"/>
      <stop offset="12%"  stop-color="#6B4E00"/>
      <stop offset="35%"  stop-color="#B8860B"/>
      <stop offset="50%"  stop-color="#FFE87C"/>
      <stop offset="62%"  stop-color="#DAA520"/>
      <stop offset="82%"  stop-color="#8B6200"/>
      <stop offset="100%" stop-color="#2A1800"/>
    </linearGradient>

    <!-- Specular top highlight on petal (bright glint near tip) -->
    <linearGradient id="petalGlint" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="white"   stop-opacity="0.7"/>
      <stop offset="30%"  stop-color="#FFFACD"  stop-opacity="0.4"/>
      <stop offset="100%" stop-color="white"   stop-opacity="0"/>
    </linearGradient>

    <!-- Center starburst radial -->
    <radialGradient id="centerGrad" cx="45%" cy="40%" r="60%">
      <stop offset="0%"   stop-color="white"/>
      <stop offset="15%"  stop-color="#FFFACD"/>
      <stop offset="40%"  stop-color="#FFD700"/>
      <stop offset="70%"  stop-color="#8B6200"/>
      <stop offset="100%" stop-color="#3D2000"/>
    </radialGradient>

    <!-- Glow filter -->
    <filter id="glow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Deep glow for star center -->
    <filter id="starGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Text glow -->
    <filter id="textGlow" x="-10%" y="-20%" width="120%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- ── LIGHT BLUE BACKGROUND ── -->
  <rect x="0" y="0" width="820" height="390" rx="195" ry="195" fill="#AED6F1"/>

  <!-- ── OUTER PILL BORDER (pulsing) ── -->
  <rect x="6" y="6" width="808" height="378" rx="189" ry="189"
        fill="none" stroke="url(#goldMetal)" stroke-width="3" filter="url(#glow)">
    <animate attributeName="stroke-width" values="2.5;4.5;2.5" dur="3.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity"      values="0.75;1;0.75"   dur="3.5s" repeatCount="indefinite"/>
  </rect>

  <!-- INNER PILL BORDER -->
  <rect x="18" y="18" width="784" height="354" rx="177" ry="177"
        fill="none" stroke="url(#goldMetal)" stroke-width="0.8" opacity="0.4"/>

  <!-- ── VERTICAL DIVIDER ── -->
  <line x1="470" y1="55" x2="470" y2="335"
        stroke="url(#goldMetal)" stroke-width="0.6" opacity="0.25"/>

  <!-- ═══════════════════════════════════════════
       3D METALLIC COMPASS STAR — centered 255,195
       Matches the original: sharp tapered petals,
       convex surface, specular highlights, starburst center
       ═══════════════════════════════════════════ -->
  <g transform="translate(255,195)">
    <g>
      <animateTransform attributeName="transform" type="rotate"
                        from="0" to="360" dur="22s" repeatCount="indefinite"/>

      <!-- ── 4 MAIN PETALS (cardinal, length 92) ── -->
      <!-- Each petal: base 3D gradient + narrow specular glint near tip -->

      <!-- NORTH petal -->
      <g transform="rotate(0)">
        <!-- Base convex surface -->
        <path d="M0,-92 C15,-46 15,46 0,92 C-15,46 -15,-46 0,-92Z" fill="url(#petal3D)"/>
        <!-- Specular glint top half -->
        <path d="M0,-92 C6,-60 5,-20 2,0 C-1,-20 -3,-60 0,-92Z" fill="url(#petalGlint)"/>
        <!-- Dark edge crease lines for depth -->
        <path d="M0,-92 C3,-55 2,-20 0,0" stroke="#3D2000" stroke-width="0.5" fill="none" opacity="0.4"/>
        <path d="M0,-92 C-3,-55 -2,-20 0,0" stroke="#B8860B" stroke-width="0.3" fill="none" opacity="0.25"/>
      </g>

      <!-- SOUTH petal -->
      <g transform="rotate(180)">
        <path d="M0,-92 C15,-46 15,46 0,92 C-15,46 -15,-46 0,-92Z" fill="url(#petal3D)"/>
        <path d="M0,-92 C6,-60 5,-20 2,0 C-1,-20 -3,-60 0,-92Z" fill="url(#petalGlint)"/>
        <path d="M0,-92 C3,-55 2,-20 0,0" stroke="#3D2000" stroke-width="0.5" fill="none" opacity="0.4"/>
      </g>

      <!-- EAST petal -->
      <g transform="rotate(90)">
        <path d="M0,-92 C15,-46 15,46 0,92 C-15,46 -15,-46 0,-92Z" fill="url(#petal3D)"/>
        <path d="M0,-92 C6,-60 5,-20 2,0 C-1,-20 -3,-60 0,-92Z" fill="url(#petalGlint)"/>
        <path d="M0,-92 C3,-55 2,-20 0,0" stroke="#3D2000" stroke-width="0.5" fill="none" opacity="0.4"/>
      </g>

      <!-- WEST petal -->
      <g transform="rotate(270)">
        <path d="M0,-92 C15,-46 15,46 0,92 C-15,46 -15,-46 0,-92Z" fill="url(#petal3D)"/>
        <path d="M0,-92 C6,-60 5,-20 2,0 C-1,-20 -3,-60 0,-92Z" fill="url(#petalGlint)"/>
        <path d="M0,-92 C3,-55 2,-20 0,0" stroke="#3D2000" stroke-width="0.5" fill="none" opacity="0.4"/>
      </g>

      <!-- ── 4 DIAGONAL PETALS (45°, shorter length 64) ── -->

      <g transform="rotate(45)">
        <path d="M0,-64 C11,-32 11,32 0,64 C-11,32 -11,-32 0,-64Z" fill="url(#petal3DSec)"/>
        <path d="M0,-64 C5,-38 4,-12 1,0 C-1,-12 -2,-38 0,-64Z" fill="url(#petalGlint)" opacity="0.8"/>
        <path d="M0,-64 C2,-38 1,-14 0,0" stroke="#3D2000" stroke-width="0.5" fill="none" opacity="0.35"/>
      </g>

      <g transform="rotate(135)">
        <path d="M0,-64 C11,-32 11,32 0,64 C-11,32 -11,-32 0,-64Z" fill="url(#petal3DSec)"/>
        <path d="M0,-64 C5,-38 4,-12 1,0 C-1,-12 -2,-38 0,-64Z" fill="url(#petalGlint)" opacity="0.8"/>
        <path d="M0,-64 C2,-38 1,-14 0,0" stroke="#3D2000" stroke-width="0.5" fill="none" opacity="0.35"/>
      </g>

      <g transform="rotate(225)">
        <path d="M0,-64 C11,-32 11,32 0,64 C-11,32 -11,-32 0,-64Z" fill="url(#petal3DSec)"/>
        <path d="M0,-64 C5,-38 4,-12 1,0 C-1,-12 -2,-38 0,-64Z" fill="url(#petalGlint)" opacity="0.8"/>
        <path d="M0,-64 C2,-38 1,-14 0,0" stroke="#3D2000" stroke-width="0.5" fill="none" opacity="0.35"/>
      </g>

      <g transform="rotate(315)">
        <path d="M0,-64 C11,-32 11,32 0,64 C-11,32 -11,-32 0,-64Z" fill="url(#petal3DSec)"/>
        <path d="M0,-64 C5,-38 4,-12 1,0 C-1,-12 -2,-38 0,-64Z" fill="url(#petalGlint)" opacity="0.8"/>
        <path d="M0,-64 C2,-38 1,-14 0,0" stroke="#3D2000" stroke-width="0.5" fill="none" opacity="0.35"/>
      </g>

      <!-- ── CENTER STARBURST ── -->
      <!-- Dark ring -->
      <circle cx="0" cy="0" r="18" fill="#1A0E00"/>
      <!-- Radial starburst -->
      <circle cx="0" cy="0" r="16" fill="url(#centerGrad)" filter="url(#starGlow)"/>
      <!-- Inner bright core -->
      <circle cx="0" cy="0" r="7"  fill="#FFFACD" opacity="0.95"/>
      <!-- Specular dot -->
      <circle cx="-3" cy="-3" r="3" fill="white" opacity="0.75"/>
    </g>
  </g>

  <!-- ════════════════════════════
       HEBREW LABELS
       ════════════════════════════ -->
  <line x1="170" y1="71" x2="208" y2="71" stroke="url(#goldMetal)" stroke-width="1.5"/>
  <text x="255" y="75" text-anchor="middle"
        font-family="'Frank Ruhl Libre', 'David', serif" font-size="23" font-weight="500"
        fill="url(#goldMetal)" filter="url(#textGlow)">אושר</text>
  <line x1="302" y1="71" x2="340" y2="71" stroke="url(#goldMetal)" stroke-width="1.5"/>

  <line x1="155" y1="322" x2="195" y2="322" stroke="url(#goldMetal)" stroke-width="1.5"/>
  <text x="255" y="326" text-anchor="middle"
        font-family="'Frank Ruhl Libre', 'David', serif" font-size="23" font-weight="500"
        fill="url(#goldMetal)" filter="url(#textGlow)">הצלחה</text>
  <line x1="315" y1="322" x2="355" y2="322" stroke="url(#goldMetal)" stroke-width="1.5"/>

  <text x="117" y="201" text-anchor="middle"
        font-family="'Frank Ruhl Libre', 'David', serif" font-size="23" font-weight="500"
        fill="url(#goldMetal)" filter="url(#textGlow)">צמיחה</text>

  <text x="393" y="201" text-anchor="middle"
        font-family="'Frank Ruhl Libre', 'David', serif" font-size="23" font-weight="500"
        fill="url(#goldMetal)" filter="url(#textGlow)">איזון</text>

  <!-- ════════════════════════════
       ANIS — Cinzel + gold shimmer
       ════════════════════════════ -->
  <text x="636" y="242" text-anchor="middle"
        font-family="'Cinzel', Georgia, serif"
        font-size="118" font-weight="300"
        fill="url(#anisShimmer)"
        letter-spacing="12"
        filter="url(#textGlow)">ANIS</text>

</svg>
