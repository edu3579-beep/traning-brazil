<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>ANIS Logo Preview</title>
    <style>
      body {
        margin: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        gap: 40px;
        font-family: Arial, sans-serif;
      }
      h3 {
        color: #555;
        margin: 0;
      }

      /* Dark background preview */
      .dark {
        background: #0a0a1a;
        padding: 40px 60px;
        border-radius: 16px;
      }
      /* Light background preview */
      .light {
        background: #f0f8ff;
        padding: 40px 60px;
        border-radius: 16px;
        border: 1px solid #cde;
      }

      img,
      object {
        max-width: 820px;
        width: 100%;
      }
    </style>
  </head>
  <body>
    <h3>On dark background</h3>
    <div class="dark">
      <img src="anis-logo.svg" alt="ANIS Logo" />
    </div>

    <h3>On light background</h3>
    <div class="light">
      <img src="anis-logo.svg" alt="ANIS Logo" />
    </div>
  </body>
</html>
